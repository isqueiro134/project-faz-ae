<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/onboarding.css">
    <script type="module" src="../js/onboarding.js" defer></script>
    <script type="module" src="../js/logout.js" defer></script>
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">FA</div>
                <span>Faz Aê</span>
            </div>
            <nav>
                <p>Menu Principal</p>
                <ul>
                    <li><a class="link active" href="/dashboard"><i class="fa-solid fa-house"></i> Dashboard</a></li>
                    <li><a class="link" href="/publicar-projeto"><i class="fa-solid fa-briefcase"></i> Publicar Projeto</a></li>
                    <li><a class="link" href="/meus-projetos"><i class="fa-solid fa-layer-group"></i> Meus Projetos</a></li>
                    <li><a class="link" href="/freelancers"><i class="fa-solid fa-user-group"></i> Freelancers</a></li>
                    <li><a class="link" href="/mensagens"><i class="fa-regular fa-comment"></i> Mensagens</a></li>
                    <li><a class="link" href="/conta"><i class="fa-solid fa-gear"></i> Conta</a></li>
                </ul>
            </nav>
            <button class="sidebar-logout" type="button" data-logout>
                <i class="fa-solid fa-right-from-bracket"></i> Sair
            </button>
        </aside>

        <main class="main">
            <div class="onboarding-card">
                <h2>Bem-vindo, <span id="nomeUsuario"></span>!</h2>
                <p class="subtitle">
                    Como você gostaria de usar a plataforma Faz Aê?
                </p>
                <div class="options">
                    <div class="option" data-type="freelancer">
                        <h3>Sou Freelancer</h3>
                        <p>Ofereça seus serviços e receba propostas</p>
                    </div>
                    <div class="option" data-type="cliente">
                        <h3>Sou Cliente</h3>
                        <p>Publique projetos e encontre freelancers</p>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn-secondary">Voltar</button>
                    <button class="btn-primary" id="continue">Continuar</button>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
